name: Publish APK Release

on:
  push:
    branches:
      - main
    paths:
      - 'gymflow-client.apk'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: GymFlow Client ${{ steps.tag.outputs.tag }}
          body: "Automated release — built and pushed on ${{ github.event.head_commit.timestamp }}"
          files: gymflow-client.apk
          make_latest: true
